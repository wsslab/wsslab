name: Weekly Advisor Sync

on:
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install beautifulsoup4 pyyaml

      - name: Run Sync Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python scripts/sync_advisor_data.py

      - name: Regenerate Publications JSON
        run: |
          python scripts/bib2json.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/news.yml _data/publications.bib _data/publications.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync advisor news and publications" && git push)
